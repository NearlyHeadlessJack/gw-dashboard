database:
  type: sqlite3
  connection: database/gw.sqlite3

backend:
  host: 0.0.0.0
  port: 8000
  reload: false
  cors_origins:
    - http://localhost:5173
  cache_ttl_seconds: 30

frontend:
  origin: http://localhost:5173
  # 默认使用 Python 包内置前端静态文件；开发时可改为 frontend/dist 或其他绝对路径。
  dist_dir: gw/web/static

daemon:
  update_check_interval_seconds: 3600
  data_valid_duration_seconds: 86400
  satellite_record_limit: 1000

scraper:
  network_timeout_seconds: 30
